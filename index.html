<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر الطبخ العالمي | النسخة المطورة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --chef-red: #ff4757;
            --chef-gold: #ffa502;
            --kitchen-blue: #2f3542;
            --fire-color: #ff6b6b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cairo', sans-serif; background: #f1f2f6; color: var(--kitchen-blue); overflow-x: hidden; }

        /* البحث والواجهة */
        .search-section { background: var(--kitchen-blue); padding: 50px 20px; text-align: center; color: white; }
        .search-bar { background: white; padding: 10px; border-radius: 50px; display: flex; max-width: 600px; margin: 20px auto; }
        .search-bar input { flex: 1; border: none; padding: 15px; font-size: 1.1rem; outline: none; border-radius: 50px; font-family: 'Cairo'; }
        .search-bar button { background: var(--chef-red); color: white; border: none; padding: 0 30px; border-radius: 50px; cursor: pointer; font-weight: bold; }

        .container { padding: 40px 8%; }
        .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .recipe-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; }
        .recipe-card:hover { transform: translateY(-5px); }
        .recipe-card img { width: 100%; height: 200px; object-fit: cover; }

        /* --- واجهة المختبر (Overlay) --- */
        #cookingLab {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 2000; display: none; overflow-y: auto;
            grid-template-columns: 1fr 1fr; padding: 20px; gap: 20px;
        }

        /* رسم الإناء برمجياً (SVG) */
        .visual-area { background: #eef2f3; border-radius: 25px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        .pot-svg { width: 280px; height: auto; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1)); transition: 0.5s; }
        
        .fire { 
            width: 100px; height: 50px; background: var(--fire-color); 
            filter: blur(15px); border-radius: 50%; position: absolute; bottom: 120px; 
            display: none; animation: flicker 0.1s infinite alternate; 
        }

        @keyframes flicker { from { transform: scale(1); opacity: 0.8; } to { transform: scale(1.1); opacity: 1; } }

        .ingredient-drop { position: absolute; top: -50px; font-size: 3rem; display: none; z-index: 10; }
        .animate-drop { display: block !important; animation: dropIng 0.7s forwards; }
        @keyframes dropIng { 0% { top: -50px; } 100% { top: 250px; opacity: 0; } }

        .steam { position: absolute; top: 150px; font-size: 2rem; animation: steamMove 2s infinite; opacity: 0; }
        @keyframes steamMove { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-100px); opacity: 0; } }

        /* منطقة البيانات */
        .data-area { padding: 20px; text-align: right; }
        .ing-container { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0; }
        .ing-btn { background: #fff; border: 2px solid #ddd; padding: 8px 15px; border-radius: 50px; cursor: pointer; font-weight: bold; font-family: 'Cairo'; }
        .ing-btn.added { background: var(--chef-gold); color: white; border-color: var(--chef-gold); }

        .method-box { background: var(--kitchen-blue); color: white; padding: 20px; border-radius: 15px; display: none; margin-top: 20px; }

        .close-lab { position: absolute; top: 15px; right: 20px; font-size: 2rem; cursor: pointer; color: var(--chef-red); z-index: 100; }

        @media (max-width: 800px) { #cookingLab { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <section class="search-section">
        <h1>🍳 مختبر الطبخ العالمي</h1>
        <div class="search-bar">
            <input type="text" id="userInput" placeholder="ابحث عن أكلة (مثلاً: شوربة، بيتزا، كبسة)...">
            <button onclick="fetchRecipes()">اكتشف</button>
        </div>
    </section>

    <div class="container">
        <div class="recipe-grid" id="mainGrid"></div>
    </div>

    <div id="cookingLab">
        <span class="close-lab" onclick="closeLab()">&times;</span>
        
        <div class="visual-area">
            <div class="fire" id="potFire"></div>
            <div class="steam" id="steam1">💨</div>
            <div class="ingredient-drop" id="ingAnim">🥕</div>
            
            <svg class="pot-svg" viewBox="0 0 512 512" id="potBody">
                <path fill="#95a5a6" d="M448 128H64v64h384z"/>
                <path fill="#7f8c8d" d="M96 192h320l-32 256H128z"/>
                <path fill="#bdc3c7" d="M128 448h256v32H128z"/>
                <rect x="224" y="64" width="64" height="64" rx="10" fill="#7f8c8d"/>
            </svg>

            <h2 id="cookingStatus" style="margin-top: 20px; color: var(--chef-red);">أضف المكونات!</h2>
        </div>

        <div class="data-area">
            <h1 id="labTitle">اسم الأكلة</h1>
            <div class="ing-container" id="ingList"></div>
            <div class="method-box" id="methodBox">
                <h3>طريقة التحضير والتقديم:</h3>
                <p id="methodText" style="font-size: 0.9rem; line-height: 1.6; margin-top: 10px;"></p>
            </div>
        </div>
    </div>

    <script>
        async function fetchRecipes() {
            const query = document.getElementById('userInput').value;
            const grid = document.getElementById('mainGrid');
            if(!query) return;

            const trans = await fetch(`https://api.mymemory.translated.net/get?q=${query}&langpair=ar|en`);
            const transData = await trans.json();
            const engQuery = transData.responseData.translatedText;

            const res = await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${engQuery}`);
            const data = await res.json();

            grid.innerHTML = "";
            if(data.meals) {
                data.meals.forEach(meal => {
                    grid.innerHTML += `
                        <div class="recipe-card" onclick="openLab(${JSON.stringify(meal).replace(/"/g, '&quot;')})">
                            <img src="${meal.strMealThumb}">
                            <div style="padding:15px; text-align:center;"><h3>${meal.strMeal}</h3></div>
                        </div>`;
                });
            }
        }

        let count = 0, total = 0;

        function openLab(meal) {
            document.getElementById('cookingLab').style.display = 'grid';
            document.getElementById('labTitle').innerText = meal.strMeal;
            document.getElementById('methodText').innerText = meal.strInstructions;
            document.getElementById('methodBox').style.display = 'none';
            document.getElementById('potFire').style.display = 'none';
            const list = document.getElementById('ingList');
            list.innerHTML = "";
            count = 0;

            let ings = [];
            for(let i=1; i<=20; i++) {
                if(meal[`strIngredient${i}`]) ings.push(meal[`strMeasure${i}`] + " " + meal[`strIngredient${i}`]);
            }
            total = ings.length;

            ings.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'ing-btn';
                btn.innerText = item;
                btn.onclick = function() {
                    if(!this.classList.contains('added')) {
                        this.classList.add('added');
                        const anim = document.getElementById('ingAnim');
                        anim.classList.remove('animate-drop');
                        void anim.offsetWidth;
                        anim.classList.add('animate-drop');
                        count++;
                        if(count === total) {
                            document.getElementById('methodBox').style.display = 'block';
                            document.getElementById('potFire').style.display = 'block';
                            document.getElementById('steam1').style.opacity = '1';
                            document.getElementById('cookingStatus').innerText = "تم الطبخ بنجاح! 🔥";
                        } else {
                            document.getElementById('cookingStatus').innerText = `أضفت ${count} مكونات`;
                        }
                    }
                };
                list.appendChild(btn);
            });
        }

        function closeLab() { document.getElementById('cookingLab').style.display = 'none'; }
    </script>
</body>
</html>
