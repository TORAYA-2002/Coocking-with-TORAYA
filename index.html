<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موسوعة الطبخ العالمية | بدون حدود</title>
    <style>
        /* تصميم عصري واحترافي */
        :root {
            --primary: #27ae60;
            --accent: #f1c40f;
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #2c3e50;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg: #1a1a1a;
            --card: #2d2d2d;
            --text: #ecf0f1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            transition: var(--transition);
        }

        /* الهيدر والبحث */
        header {
            background: linear-gradient(135deg, #1e272e, #2ecc71);
            color: white;
            padding: 60px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .search-group {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 10px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        input {
            flex: 1;
            padding: 15px 25px;
            border-radius: 30px;
            border: none;
            font-size: 1rem;
            outline: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .btn-search {
            background: var(--accent);
            border: none;
            padding: 0 30px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: var(--transition);
        }

        .btn-search:hover { transform: scale(1.05); background: #f39c12; }

        /* زر المود الليلي */
        .theme-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            background: var(--card);
            color: var(--text);
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* شبكة البطاقات */
        .container { padding: 40px 8%; }
        
        .recipe-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        /* تصميم البطاقة */
        .recipe-card {
            background: var(--card);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: var(--transition);
            opacity: 0;
            transform: translateY(20px);
            animation: showUp 0.5s forwards;
        }

        @keyframes showUp { to { opacity: 1; transform: translateY(0); } }

        .recipe-card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.15); }

        .card-img { width: 100%; height: 230px; object-fit: cover; }

        .card-body { padding: 20px; }

        .category-badge {
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 10px;
            font-size: 0.8rem;
        }

        .recipe-meta {
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .video-btn {
            display: block;
            text-align: center;
            background: #eb4d4b;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        .video-btn:hover { background: #ff7979; }

        #loading { text-align: center; padding: 20px; display: none; font-size: 1.2rem; }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">🌓 تبديل الوضع</button>

    <header>
        <h1>مطبخ العالم المفتوح 🌍</h1>
        <p>آلاف الوصفات العالمية بلمسة زر واحدة</p>
        <div class="search-group">
            <input type="text" id="searchInput" placeholder="ابحث بالإنجليزية (مثلاً: Chicken, Pizza, Meat)...">
            <button class="btn-search" onclick="fetchRecipes()">بحث ذكي</button>
        </div>
    </header>

    <div class="container">
        <div id="loading">جاري البحث في مطابخ العالم... 🥘</div>
        <div class="recipe-grid" id="recipeGrid">
            </div>
    </div>

    <script>
        // دالة جلب البيانات من API المفتوح (TheMealDB)
        async function fetchRecipes() {
            const query = document.getElementById('searchInput').value || 'a'; // افتراضي عرض أكلات تبدأ بحرف a
            const grid = document.getElementById('recipeGrid');
            const loader = document.getElementById('loading');

            grid.innerHTML = "";
            loader.style.display = "block";

            try {
                // البحث بالاسم أو المكون الرئيسي
                const response = await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${query}`);
                const data = await response.json();
                
                loader.style.display = "none";
                
                if (data.meals) {
                    renderCards(data.meals);
                } else {
                    grid.innerHTML = "<h3>لم يتم العثور على نتائج، حاول كلمة أخرى بالإنجليزية.</h3>";
                }
            } catch (error) {
                loader.innerText = "حدث خطأ في الاتصال بالشبكة.";
            }
        }

        function renderCards(meals) {
            const grid = document.getElementById('recipeGrid');
            meals.forEach((meal, index) => {
                const card = document.createElement('div');
                card.className = 'recipe-card';
                card.style.animationDelay = `${index * 0.1}s`;

                // استخراج المكونات (API يعطيها كحقول منفصلة)
                let ingredients = "";
                for(let i=1; i<=5; i++) {
                    if(meal[`strIngredient${i}`]) {
                        ingredients += meal[`strIngredient${i}`] + ", ";
                    }
                }

                card.innerHTML = `
                    <img src="${meal.strMealThumb}" class="card-img" alt="${meal.strMeal}">
                    <div class="card-body">
                        <span class="category-badge">${meal.strArea} | ${meal.strCategory}</span>
                        <h2 style="margin: 10px 0;">${meal.strMeal}</h2>
                        <div class="recipe-meta">
                            <span>🕒 وقت تقديري: 30-45 د</span>
                            <span>🌡️ حرارة متوسطة</span>
                        </div>
                        <p style="font-size: 0.9rem; margin-bottom: 15px; color: #777;">
                            <strong>المكونات:</strong> ${ingredients}...
                        </p>
                        <a href="${meal.strYoutube}" target="_blank" class="video-btn">▶ شاهد الفيديو والتحضير</a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // تبديل المود
        function toggleTheme() {
            const body = document.body;
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
            } else {
                body.setAttribute('data-theme', 'dark');
            }
        }

        // عرض وصفات عشوائية عند الفتح
        window.onload = fetchRecipes;
    </script>
</body>
</html>
