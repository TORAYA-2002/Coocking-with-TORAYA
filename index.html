<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Chef Lab | مختبر الطبخ الاحترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --accent: #d4a017;
            --bg: #050505;
            --card: #121212;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* الهيدر */
        header { 
            padding: 20px 8%; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid #222; display: flex; justify-content: space-between; 
            align-items: center; position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 1.8rem; font-weight: 900; color: var(--accent); letter-spacing: 2px; }

        /* واجهة البحث والمقترحات */
        .hero { padding: 60px 8%; text-align: center; background: radial-gradient(circle at top, #1a1a1a, #050505); }
        .search-area { max-width: 700px; margin: 30px auto; position: relative; }
        .search-area input { 
            width: 100%; padding: 20px 30px; border-radius: 15px; border: 1px solid #333;
            background: var(--card); color: white; font-size: 1.1rem; outline: none; transition: 0.3s;
        }
        .search-area input:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(212, 160, 23, 0.2); }
        .search-btn { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); background: var(--accent); border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; }

        /* الأقسام والبطاقات */
        .section-title { padding: 40px 8% 10px; color: var(--accent); font-size: 1.5rem; display: flex; align-items: center; gap: 15px; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: #222; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; padding: 20px 8% 60px; }
        
        .food-card { 
            background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid #222;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative;
        }
        .food-card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .food-card img { width: 100%; height: 250px; object-fit: cover; transition: 0.5s; }
        .food-card:hover img { transform: scale(1.1); filter: brightness(0.7); }
        
        .card-info { padding: 20px; text-align: center; }
        .badge { position: absolute; top: 15px; right: 15px; background: var(--accent); color: black; padding: 5px 15px; border-radius: 20px; font-weight: 900; font-size: 0.8rem; }

        /* --- المختبر التفاعلي المطور --- */
        #labOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 2000; display: none; grid-template-columns: 1fr 1fr;
        }
        
        .lab-visual { 
            background: #080808; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; position: relative; border-left: 1px solid #222;
        }
        .pot-box { position: relative; width: 300px; }
        .pot-svg { width: 100%; fill: #111; stroke: var(--accent); stroke-width: 2; transition: 0.5s; }
        
        .fly-item { position: absolute; top: -100px; font-size: 4rem; display: none; z-index: 10; }
        @keyframes fallInto { 0% { top: -100px; transform: scale(1.5); } 100% { top: 200px; opacity: 0; transform: scale(0.5); } }
        .animate-fall { display: block !important; animation: fallInto 0.7s forwards; }

        .lab-data { padding: 60px; overflow-y: auto; text-align: right; }
        .step-indicator { color: var(--accent); font-weight: 900; margin-bottom: 10px; display: block; }
        
        .ing-grid { display: flex; flex-direction: column; gap: 15px; margin: 30px 0; }
        .ing-row { 
            background: #1a1a1a; padding: 15px 25px; border-radius: 12px; 
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #333; cursor: pointer; transition: 0.3s;
        }
        .ing-row:hover { border-color: var(--accent); }
        .ing-row.locked { opacity: 0.3; cursor: not-allowed; }
        .ing-row.completed { border-color: #27ae60; background: rgba(39, 174, 96, 0.1); }
        
        .recipe-final { display: none; margin-top: 30px; animation: fadeInUp 0.8s; }
        .video-box { margin-top: 20px; border-radius: 20px; overflow: hidden; border: 2px solid var(--accent); }
        
        .close-lab { position: absolute; top: 30px; left: 30px; font-size: 2.5rem; color: var(--accent); cursor: pointer; }

        @media (max-width: 1000px) { #labOverlay { grid-template-columns: 1fr; } .lab-data { padding: 20px; } }
    </style>
</head>
<body>

    <header>
        <div class="logo">MASTER<span>LAB</span></div>
        <div id="statusClock" style="font-weight: 600; color: #888;"></div>
    </header>

    <section class="hero">
        <h1 style="font-size: 2.5rem; margin-bottom: 10px;">ما هي تحفتك القادمة؟</h1>
        <div class="search-area">
            <input type="text" id="mainSearch" placeholder="ابحث عن أكلة (دجاج، سمك، باستا...)" onkeyup="if(event.key==='Enter') startSearch()">
            <button class="search-btn" onclick="startSearch()">اكتشف</button>
        </div>
    </section>

    <div class="section-title"><i class="fas fa-crown"></i> موسوعة البسطيلة المغربية</div>
    <div class="grid" id="specialGrid"></div>

    <div class="section-title"><i class="fas fa-fire"></i> مقترحات الشيف (أكلات عالمية)</div>
    <div class="grid" id="suggestGrid"></div>

    <div id="labOverlay">
        <span class="close-lab" onclick="closeLab()">&times;</span>
        <div class="lab-visual">
            <div id="flyItem" class="fly-item">🥘</div>
            <div class="pot-box">
                <svg class="pot-svg" viewBox="0 0 512 512">
                    <path d="M448 128H64v64h384zM96 192h320l-32 256H128z"/>
                    <rect x="224" y="64" width="64" height="64" rx="10" fill="var(--accent)"/>
                </svg>
            </div>
            <h2 id="labStatus" style="margin-top: 30px; color: var(--accent);">بانتظار المكونات...</h2>
        </div>
        
        <div class="lab-data">
            <span class="step-indicator" id="currentStepTxt">المرحلة 1 من 1</span>
            <h1 id="labMealTitle" style="font-size: 2.2rem; margin-bottom: 10px;"></h1>
            <div class="ing-grid" id="ingList"></div>
            
            <div class="recipe-final" id="finalView">
                <h3 style="color: var(--accent);"><i class="fas fa-scroll"></i> سر التحضير والتقديم</h3>
                <p id="methodText" style="line-height: 2; font-size: 1.1rem; margin-top: 15px;"></p>
                <div class="video-box" id="videoBox"></div>
            </div>
        </div>
    </div>

    <script>
        // قاعدة البيانات الثابتة للبسطيلة
        const bastillaData = [
            {
                id: "b1", meal: "بسطيلة الدجاج واللوز", time: "90 دقيقة", type: "ملكية",
                img: "https://images.unsplash.com/photo-1632344793540-16982845347e?q=80&w=800",
                ingredients: ["1.5 كجم دجاج مقطع", "1 كجم بصل مفروم", "250 جرام لوز مقلي", "8 بيضات بلدية", "سمن وزعفران وقرفة", "ورقة بسطيلة طرية"],
                method: "يُطهى الدجاج مع التوابل والبصل حتى ينضج، نُحضر دغميرة البيض مع المرق المتبقي، ثم نضع طبقات الدجاج والبيض واللوز المهرمش داخل الورقة وتُخبز حتى التقرمش.",
                yt: "https://www.youtube.com/embed/S_8qM888M6A"
            },
            {
                id: "b2", meal: "بسطيلة السمك الحارة", time: "60 دقيقة", type: "بحرية",
                img: "https://images.unsplash.com/photo-1559339352-11d035aa65de?q=80&w=800",
                ingredients: ["500 جرام سمك ميرلا", "500 جرام قمرون", "500 جرام كلمار", "شعرية صينية", "شرمولة مغربية حارة", "فطر أسود"],
                method: "تُشحر فواكه البحر مع الشرمولة، تُخلط مع الشعرية الصينية المسلوقة، ثم تُحشى في الورقة وتُزين بالجبن الأحمر والقمرون عند التقديم.",
                yt: "https://www.youtube.com/embed/m6lX6l9Z95M"
            }
        ];

        let currentActiveStep = 0;

        window.onload = () => {
            setInterval(() => { document.getElementById('statusClock').innerText = new Date().toLocaleTimeString('ar-MA'); }, 1000);
            renderSpecial();
            fetchSuggestions();
        };

        function renderSpecial() {
            const grid = document.getElementById('specialGrid');
            bastillaData.forEach(item => {
                grid.innerHTML += `
                    <div class="food-card animate__animated animate__fadeInUp">
                        <div class="badge">${item.type}</div>
                        <img src="${item.img}">
                        <div class="card-info">
                            <h3>${item.meal}</h3>
                            <p style="color: #666; font-size: 0.9rem; margin: 10px 0;">مدة الطهي: ${item.time}</p>
                            <button class="search-btn" style="position:relative; width:100%;" onclick='openLab(${JSON.stringify(item)})'>دخول المختبر</button>
                        </div>
                    </div>`;
            });
        }

        async function fetchSuggestions() {
            for(let i=0; i<6; i++) {
                const res = await fetch('https://www.themealdb.com/api/json/v1/1/random.php');
                const data = await res.json();
                renderMeal(data.meals[0], 'suggestGrid');
            }
        }

        async function startSearch() {
            const query = document.getElementById('mainSearch').value;
            if(!query) return;
            const res = await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${query}`);
            const data = await res.json();
            const grid = document.getElementById('suggestGrid');
            grid.innerHTML = "";
            if(data.meals) data.meals.forEach(m => renderMeal(m, 'suggestGrid'));
        }

        function renderMeal(meal, targetId) {
            const grid = document.getElementById(targetId);
            const mealObj = {
                meal: meal.strMeal, img: meal.strMealThumb, time: "45 دقيقة", 
                ingredients: [], method: meal.strInstructions, yt: meal.strYoutube?.replace("watch?v=", "embed/")
            };
            for(let i=1; i<=20; i++) if(meal[`strIngredient${i}`]) mealObj.ingredients.push(meal[`strMeasure${i}`] + " " + meal[`strIngredient${i}`]);
            
            grid.innerHTML += `
                <div class="food-card animate__animated animate__fadeIn">
                    <img src="${mealObj.img}">
                    <div class="card-info">
                        <h3>${mealObj.meal}</h3>
                        <button class="search-btn" style="position:relative; width:100%;" onclick='openLab(${JSON.stringify(mealObj).replace(/'/g, "&apos;")})'>تحضير الوصفة</button>
                    </div>
                </div>`;
        }

        function openLab(item) {
            currentActiveStep = 0;
            document.getElementById('labOverlay').style.display = 'grid';
            document.getElementById('labMealTitle').innerText = item.meal;
            document.getElementById('methodText').innerText = item.method;
            document.getElementById('finalView').style.display = 'none';
            document.getElementById('labStatus').innerText = "بانتظار المكون الأول...";
            
            const list = document.getElementById('ingList');
            list.innerHTML = "";
            
            item.ingredients.forEach((ing, idx) => {
                const row = document.createElement('div');
                row.className = `ing-row ${idx > 0 ? 'locked' : ''}`;
                row.id = `step-${idx}`;
                row.innerHTML = `<span>${ing}</span> <i class="fas ${idx === 0 ? 'fa-play' : 'fa-lock'}"></i>`;
                row.onclick = () => processStep(idx, item);
                list.appendChild(row);
            });
            document.getElementById('currentStepTxt').innerText = `المرحلة 1 من ${item.ingredients.length}`;
        }

        function processStep(idx, item) {
            if(idx !== currentActiveStep) return;

            const fly = document.getElementById('flyItem');
            fly.classList.remove('animate-fall');
            void fly.offsetWidth;
            fly.classList.add('animate-fall');

            const currentRow = document.getElementById(`step-${idx}`);
            currentRow.classList.remove('locked');
            currentRow.classList.add('completed');
            currentRow.querySelector('i').className = "fas fa-check-circle";

            currentActiveStep++;

            if(currentActiveStep < item.ingredients.length) {
                const nextRow = document.getElementById(`step-${currentActiveStep}`);
                nextRow.classList.remove('locked');
                nextRow.querySelector('i').className = "fas fa-arrow-down";
                document.getElementById('labStatus').innerText = `أضفت ${currentActiveStep} من ${item.ingredients.length}`;
                document.getElementById('currentStepTxt').innerText = `المرحلة ${currentActiveStep + 1} من ${item.ingredients.length}`;
            } else {
                finishCooking(item);
            }
        }

        function finishCooking(item) {
            document.getElementById('labStatus').innerText = "التحفة جاهزة! استمتع 🔥";
            document.getElementById('finalView').style.display = 'block';
            if(item.yt) {
                document.getElementById('videoBox').innerHTML = `<iframe width="100%" height="300" src="${item.yt}" frameborder="0" allowfullscreen></iframe>`;
            }
        }

        function closeLab() { document.getElementById('labOverlay').style.display = 'none'; }
    </script>
</body>
</html>
