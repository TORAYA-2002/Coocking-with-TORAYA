<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cooking-with-TORAYA | الفيديوهات المصلحة</title>
    <style>
        /* --- التصميم الأصلي المعتمد --- */
        :root {
            --primary: #e67e22;
            --secondary: #27ae60;
            --dark: #2c3e50;
            --light: #f4f4f4;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--light); 
            margin: 0; 
            color: var(--dark);
        }

        header { 
            background: var(--dark); 
            color: white; 
            padding: 3rem 1rem; 
            text-align: center; 
        }

        .search-container { 
            margin: -25px auto 20px; 
            display: flex; 
            justify-content: center; 
            max-width: 700px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 50px;
            overflow: hidden;
            background: white;
        }

        input { padding: 15px 25px; width: 100%; border: none; outline: none; font-size: 1.1rem; }
        .search-btn { padding: 15px 30px; background: var(--primary); border: none; color: white; cursor: pointer; font-weight: bold; }

        .categories { display: flex; justify-content: center; gap: 12px; margin: 20px; flex-wrap: wrap; }
        .cat-btn { padding: 10px 22px; border-radius: 25px; border: 2px solid var(--primary); background: white; color: var(--primary); cursor: pointer; font-weight: bold; transition: 0.3s; }
        .cat-btn.active, .cat-btn:hover { background: var(--primary); color: white; }

        .recipe-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; padding: 20px; max-width: 1300px; margin: 0 auto; }
        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.08); transition: 0.3s; }
        .card:hover { transform: translateY(-8px); }

        /* حاوية الفيديو المحسنة */
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .details { padding: 20px; }
        .badge { background: var(--secondary); color: white; padding: 4px 10px; border-radius: 8px; font-size: 12px; display: inline-block; margin-bottom: 10px; }
        .title { margin: 5px 0; font-size: 1.5rem; color: var(--dark); font-weight: bold; }
        .timer { color: #7f8c8d; font-size: 14px; margin-bottom: 15px; display: block; }
        .section-title { color: var(--primary); font-weight: bold; margin-top: 15px; display: block; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        ul, ol { padding-right: 25px; font-size: 0.95rem; line-height: 1.6; color: #444; }
        #noResults { text-align: center; padding: 50px; display: none; font-size: 1.2rem; color: #7f8c8d; }
    </style>
</head>
<body>

<header>
    <h1>Cooking-with-TORAYA 🍳</h1>
    <p>وصفات عالمية بدقة عالية وفيديوهات مفعلة</p>
</header>

<div class="search-container">
    <input type="text" id="recipeSearch" oninput="runSearch()" placeholder="ابحث مثلاً: كسكس، Pizza، Pancake، فطور...">
    <button class="search-btn">بحث</button>
</div>

<nav class="categories">
    <button class="cat-btn active" onclick="filterType('all', this)">الكل</button>
    <button class="cat-btn" onclick="filterType('فطور', this)">فطور</button>
    <button class="cat-btn" onclick="filterType('غداء', this)">غداء</button>
    <button class="cat-btn" onclick="filterType('عشاء', this)">عشاء</button>
    <button class="cat-btn" onclick="filterType('حلويات', this)">حلويات</button>
</nav>

<div id="noResults">🔎 عذراً، لم نجد هذه الوصفة.. جرب كلمة أخرى!</div>

<main id="recipeGrid" class="recipe-grid"></main>

<script>
    // قاعدة بيانات محدثة بروابط "Embed" رسمية مفعلة للمواقع الخارجية
    const recipes = [
        {
            names: ["الكسكس المغربي", "Moroccan Couscous", "Couscous"],
            searchTags: "كسكس غداء مغربي morocco lunch maghrib",
            type: "غداء",
            time: "120 دقيقة",
            ingredients: ["1 كغ كسكس رفيع", "لحم غنم مميز", "خضار (جزر، قرع، لفت، حمص)", "سمن وتوابل مغربية"],
            steps: ["تحضير المرق واللحم أولاً", "تبخير الكسكس على 3 مراحل بدقة", "إضافة الخضار حسب مدة نضجها", "التزيين في القصعة التقليدية"],
            video: "https://www.youtube.com/embed/fD3G0j1F9wY"
        },
        {
            names: ["بان كيك أمريكي", "Fluffy Pancakes", "Pancakes"],
            searchTags: "بان كيك فطور حلويات breakfast sweet hly",
            type: "فطور",
            time: "15 دقيقة",
            ingredients: ["كوب دقيق", "بيضتان وحليب", "ملعقة سكر وفانيليا", "خميرة الحلويات"],
            steps: ["مزج العناصر السائلة ثم الجافة", "صب الخليط في مقلاة ساخنة", "الانتظار حتى ظهور الفقاعات ثم القلب", "التقديم مع العسل أو المربى"],
            video: "https://www.youtube.com/embed/N_p_96K9X8o"
        },
        {
            names: ["باستا إيطالية", "Italian Pasta", "Pâtes"],
            searchTags: "باستا غداء عشاء مكرونة pasta dinner lunch",
            type: "عشاء",
            time: "20 دقيقة",
            ingredients: ["مكرونة من اختيارك", "صلصة طماطم مركزة", "ثوم، ريحان، وزيت زيتون", "جبنة موزاريلا"],
            steps: ["سلق المكرونة وتصفيتها", "تحمير الثوم مع الصلصة والمنكهات", "خلط المكرونة مع الصلصة جيداً", "إضافة الجبن وتقديمها ساخنة"],
            video: "https://www.youtube.com/embed/1-SJGQ2HLp8"
        }
    ];

    function renderRecipes(data) {
        const grid = document.getElementById('recipeGrid');
        const noResults = document.getElementById('noResults');
        
        if (data.length === 0) {
            grid.innerHTML = "";
            noResults.style.display = "block";
            return;
        }

        noResults.style.display = "none";
        grid.innerHTML = data.map(recipe => `
            <div class="card">
                <div class="video-container">
                    <iframe 
                        src="${recipe.video}" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen>
                    </iframe>
                </div>
                <div class="details">
                    <span class="badge">${recipe.type}</span>
                    <h2 class="title">${recipe.names[0]}</h2>
                    <span class="timer">⏱️ وقت الطهي: ${recipe.time}</span>
                    <span class="section-title">المقادير:</span>
                    <ul>${recipe.ingredients.map(ing => `<li>${ing}</li>`).join('')}</ul>
                    <span class="section-title">طريقة التحضير:</span>
                    <ol>${recipe.steps.map(step => `<li>${step}</li>`).join('')}</ol>
                </div>
            </div>
        `).join('');
    }

    function runSearch() {
        const term = document.getElementById('recipeSearch').value.toLowerCase().trim();
        const filtered = recipes.filter(r => 
            r.names.some(name => name.toLowerCase().includes(term)) || 
            r.searchTags.includes(term)
        );
        renderRecipes(filtered);
    }

    function filterType(type, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (type === 'all') renderRecipes(recipes);
        else renderRecipes(recipes.filter(r => r.type === type));
    }

    window.onload = () => renderRecipes(recipes);
</script>
</body>
</html>
