<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Chef Lab | المحرك الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4a017; --bg: #0a0a0a; --card: #151515; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--white); overflow-x: hidden; }

        header { padding: 20px 8%; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; background: #000; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--gold); }

        .hero { padding: 50px 8%; text-align: center; background: radial-gradient(circle, #1a1a1a 0%, #0a0a0a 100%); }
        .search-container { max-width: 600px; margin: 20px auto; display: flex; background: var(--card); border: 1px solid #333; border-radius: 12px; overflow: hidden; }
        .search-container input { flex: 1; border: none; background: transparent; padding: 15px; color: white; outline: none; font-family: 'Cairo'; }
        .search-container button { background: var(--gold); border: none; padding: 0 25px; cursor: pointer; font-weight: bold; }

        .section-title { padding: 30px 8% 10px; color: var(--gold); font-size: 1.4rem; border-bottom: 1px solid #222; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; padding: 0 8% 50px; }

        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #222; transition: 0.3s; cursor: pointer; }
        .card:hover { transform: translateY(-10px); border-color: var(--gold); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 15px; text-align: center; }

        /* المختبر التفاعلي */
        #lab { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; grid-template-columns: 1fr 1.2fr; }
        .lab-visual { background: #0d0d0d; display: flex; flex-direction: column; align-items: center; justify-content: center; border-left: 1px solid #222; }
        .pot { width: 200px; fill: none; stroke: var(--gold); stroke-width: 2; }
        
        .lab-content { padding: 40px; overflow-y: auto; text-align: right; }
        .ing-item { display: inline-block; background: #1a1a1a; padding: 10px 15px; margin: 5px; border-radius: 8px; border: 1px solid #333; cursor: pointer; }
        .ing-item.active { background: var(--gold); color: black; font-weight: bold; }

        .method-area { margin-top: 30px; display: none; border-top: 1px solid #333; padding-top: 20px; }
        .video-wrapper { margin-top: 20px; border-radius: 12px; overflow: hidden; background: #111; }
        .close-btn { position: absolute; top: 20px; left: 20px; font-size: 2rem; color: var(--gold); cursor: pointer; }

        @media (max-width: 900px) { #lab { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <div class="logo">MASTER<span>CHEF</span></div>
        <div style="color: #666;">الوضع الاحترافي مفعّل</div>
    </header>

    <section class="hero">
        <h1>البحث الذكي عن الوصفات</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="اكتب اسم الأكلة هنا (مثلاً: Chicken, Pizza, Meat)...">
            <button onclick="performSearch()">بحث ذكي</button>
        </div>
    </section>

    <div class="section-title">✨ مقترحات الشيف (بسطيلة وأطباق عالمية)</div>
    <div class="grid" id="mainGrid"></div>

    <div id="lab">
        <span class="close-btn" onclick="closeLab()">&times;</span>
        <div class="lab-visual">
            <svg class="pot" viewBox="0 0 512 512"><path d="M448 128H64v64h384zM96 192h320l-32 256H128z"/></svg>
            <h2 id="labStatus" style="margin-top:20px; color: var(--gold);">أضف المكونات</h2>
        </div>
        <div class="lab-content">
            <h1 id="labTitle" style="color: var(--gold); margin-bottom: 20px;"></h1>
            <div id="ingList"></div>
            <div class="method-area" id="methodArea">
                <h3>طريقة التحضير:</h3>
                <p id="methodText" style="line-height: 1.8; margin: 15px 0;"></p>
                <div class="video-wrapper" id="videoBox"></div>
            </div>
        </div>
    </div>

    <script>
        // دمج البسطيلة يدوياً لضمان توفرها دائماً
        const localRecipes = [
            {
                strMeal: "بسطيلة الدجاج واللوز المغربية",
                strMealThumb: "https://www.wasfati.co/wp-content/uploads/2017/05/bastila.jpg",
                ingredients: ["دجاج", "لوز مقلي", "بصل", "بيض", "ورقة بسطيلة", "زعفران وقرفة"],
                strInstructions: "يُطهى الدجاج مع البصل والتوابل، يُفتت الدجاج ويُجمع المرق مع البيض، نضع طبقات الدجاج والبيض واللوز المهرمش داخل الورقة وتُخبز في الفرن.",
                strYoutube: "https://www.youtube.com/embed/S_8qM888M6A"
            },
            {
                strMeal: "بسطيلة السمك الملكية",
                strMealThumb: "https://i.ytimg.com/vi/m6lX6l9Z95M/maxresdefault.jpg",
                ingredients: ["سمك أبيض", "قمرون", "كلمار", "شعرية صينية", "شرمولة حارة", "فطر أسود"],
                strInstructions: "تُشحر فواكه البحر مع الشرمولة، تُمزج مع الشعرية الصينية، تُحشى في الورقة وتُطهى حتى تصبح ذهبية ومقرمشة.",
                strYoutube: "https://www.youtube.com/embed/m6lX6l9Z95M"
            }
        ];

        window.onload = () => {
            localRecipes.forEach(r => renderMeal(r));
            // جلب مقترحات إضافية من الإنترنت
            fetch('https://www.themealdb.com/api/json/v1/1/search.php?s=a')
                .then(res => res.json())
                .then(data => data.meals.slice(0, 4).forEach(renderMeal));
        };

        function performSearch() {
            const query = document.getElementById('searchInput').value;
            if(!query) return;
            document.getElementById('mainGrid').innerHTML = "";
            fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${query}`)
                .then(res => res.json())
                .then(data => {
                    if(data.meals) data.meals.forEach(renderMeal);
                    else alert("عذراً، لم نجد هذه الأكلة. جرب البحث بالإنجليزية مثل (Chicken أو Pasta)");
                });
        }

        function renderMeal(meal) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${meal.strMealThumb}">
                <div class="card-body">
                    <h3>${meal.strMeal}</h3>
                    <button onclick='openLab(${JSON.stringify(meal).replace(/'/g, "&apos;")})' style="background:none; border:1px solid var(--gold); color:var(--gold); padding:8px 15px; margin-top:10px; cursor:pointer; border-radius:5px;">فتح الوصفة</button>
                </div>
            `;
            document.getElementById('mainGrid').appendChild(card);
        }

        function openLab(meal) {
            document.getElementById('lab').style.display = 'grid';
            document.getElementById('labTitle').innerText = meal.strMeal;
            document.getElementById('methodText').innerText = meal.strInstructions;
            document.getElementById('methodArea').style.display = 'none';
            
            const list = document.getElementById('ingList');
            list.innerHTML = "";
            
            let ings = meal.ingredients || [];
            if(ings.length === 0) {
                for(let i=1; i<=20; i++) {
                    if(meal[`strIngredient${i}`]) ings.push(meal[`strMeasure${i}`] + " " + meal[`strIngredient${i}`]);
                }
            }

            ings.forEach(ing => {
                const span = document.createElement('span');
                span.className = 'ing-item';
                span.innerText = ing;
                span.onclick = function() {
                    this.classList.add('active');
                    if(document.querySelectorAll('.ing-item.active').length === ings.length) {
                        showMethod(meal);
                    }
                };
                list.appendChild(span);
            });
        }

        function showMethod(meal) {
            document.getElementById('methodArea').style.display = 'block';
            document.getElementById('labStatus').innerText = "تم الطبخ! 🔥";
            if(meal.strYoutube) {
                let vidId = meal.strYoutube.includes('embed') ? meal.strYoutube : meal.strYoutube.replace("watch?v=", "embed/");
                document.getElementById('videoBox').innerHTML = `<iframe width="100%" height="300" src="${vidId}" frameborder="0" allowfullscreen></iframe>`;
            }
        }

        function closeLab() { document.getElementById('lab').style.display = 'none'; }
    </script>
</body>
</html>
