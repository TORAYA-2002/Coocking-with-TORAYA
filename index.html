<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر الطبخ الشعبي والعالمي | Legend Chef Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --gold: #d4a017; --bg: #080808; --card: #121212; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: #fff; overflow-x: hidden; }

        header { 
            padding: 20px 8%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 1.8rem; font-weight: 900; color: var(--gold); text-shadow: 0 0 10px rgba(212,160,23,0.3); }

        .hero { padding: 60px 8%; text-align: center; background: radial-gradient(circle, #1a1a1a 0%, #080808 100%); }
        .search-area { 
            max-width: 800px; margin: 30px auto; display: flex; 
            background: var(--card); border-radius: 50px; padding: 8px; border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .search-area input { 
            flex: 1; background: transparent; border: none; padding: 15px 25px; 
            color: white; font-family: 'Cairo'; font-size: 1.2rem; outline: none;
        }
        .search-area button { 
            background: var(--gold); border: none; padding: 0 40px; 
            border-radius: 50px; cursor: pointer; font-weight: 900; transition: 0.3s;
        }

        .section-label { padding: 40px 8% 10px; color: var(--gold); font-size: 1.6rem; font-weight: 900; display: flex; align-items: center; gap: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; padding: 20px 8% 60px; }

        .recipe-card { 
            background: var(--card); border-radius: 25px; overflow: hidden; border: 1px solid #222;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); animation: zoomIn 0.5s;
        }
        .recipe-card:hover { transform: translateY(-15px) scale(1.02); border-color: var(--gold); }
        .recipe-card img { width: 100%; height: 260px; object-fit: cover; }
        .card-info { padding: 25px; text-align: center; }
        .card-info h3 { font-size: 1.3rem; margin-bottom: 10px; }

        /* المختبر التفاعلي */
        #labOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 2000; display: none; grid-template-columns: 1fr 1.2fr;
        }
        .lab-visual { background: #050505; display: flex; flex-direction: column; align-items: center; justify-content: center; border-left: 2px solid #1a1a1a; }
        .lab-data { padding: 50px; overflow-y: auto; text-align: right; }
        
        .ing-grid { display: flex; flex-wrap: wrap; gap: 12px; margin: 30px 0; }
        .ing-item { 
            background: #1a1a1a; border: 1px solid #333; padding: 15px 25px; 
            border-radius: 15px; cursor: pointer; transition: 0.3s; font-size: 1rem;
        }
        .ing-item.checked { background: var(--gold); color: #000; font-weight: 900; transform: scale(0.95); }

        .recipe-steps { margin-top: 40px; display: none; animation: fadeInUp 1s; border-right: 4px solid var(--gold); padding-right: 20px; }
        .video-box { margin-top: 30px; border-radius: 20px; overflow: hidden; border: 2px solid var(--gold); box-shadow: 0 0 30px rgba(212,160,23,0.2); }
        
        .close-btn { position: absolute; top: 30px; left: 30px; font-size: 2.5rem; color: var(--gold); cursor: pointer; }

        @media (max-width: 1000px) { #labOverlay { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <div class="logo">LEGEND<span>CHEF</span></div>
        <div id="clock" style="font-weight: 600; color: var(--gold);"></div>
    </header>

    <section class="hero">
        <h1 style="font-size: 2.5rem; margin-bottom: 15px;">اشنو غنطيبو اليوم؟ 🥘</h1>
        <p style="color: #888; font-size: 1.1rem;">ابحث بالدارجة أو العربية عن أطباقك المفضلة</p>
        <div class="search-area">
            <input type="text" id="searchInput" placeholder="كسكس، طنجية، بيتزا، باستا...">
            <button onclick="smartSearch()">اكتشف الوصفة</button>
        </div>
    </section>

    <div class="section-label"><i class="fas fa-fire"></i> أطباق شعبية مختارة</div>
    <div class="grid" id="recipeGrid"></div>

    <div id="labOverlay">
        <span class="close-btn" onclick="closeLab()">&times;</span>
        <div class="lab-visual">
            <svg style="width:250px; fill:none; stroke:var(--gold); stroke-width:2" viewBox="0 0 512 512"><path d="M448 128H64v64h384zM96 192h320l-32 256H128z"/></svg>
            <h2 id="labStatus" style="margin-top: 30px; color: var(--gold); letter-spacing: 2px;">بانتظار المقادير</h2>
        </div>
        <div class="lab-data">
            <h1 id="labTitle" style="color: var(--gold); font-size: 2.8rem; margin-bottom: 10px;"></h1>
            <p id="labTime" style="color: #666; margin-bottom: 20px;"></p>
            <div class="ing-grid" id="ingList"></div>
            
            <div class="recipe-steps" id="recipeSteps">
                <h3>📜 طريقة التحضير بالدقة:</h3>
                <p id="methodText" style="line-height: 2.2; margin: 25px 0; font-size: 1.2rem;"></p>
                <div class="video-box" id="videoBox"></div>
            </div>
        </div>
    </div>

    <script>
        // ساعة حية في الهيدر
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('ar-MA'); }, 1000);

        // قاعدة بيانات الأكلات الشعبية (الدارجة)
        const localArchive = [
            {
                strMeal: "الرفيسة المغربية بالدجاج البلدي",
                strMealThumb: "https://www.maghrebine.ma/wp-content/uploads/2020/05/rfissa.jpg",
                time: "120 دقيقة",
                ingredients: ["دجاج بلدي", "1 كجم مسمن (تريد)", "بصل جوانح", "عدس وحلبة", "رأس الحانوت وسمن", "زعفران حر وملح"],
                method: "1. يُشحر الدجاج مع البصل والتوابل والسمن. 2. يُضاف الماء والعدس والحلبة ويُترك لينضج. 3. يُقطع التريد قطعاً صغيرة ويُبخر. 4. يُسقى المسمن بالمرق ويُزين بالدجاج والبيض المسلوق.",
                strYoutube: "https://www.youtube.com/embed/9BqI5S_m33I"
            },
            {
                strMeal: "الطنجية المراكشية الأصلية",
                strMealThumb: "https://i.ytimg.com/vi/Ew99EwM1R3I/maxresdefault.jpg",
                time: "180 دقيقة",
                ingredients: ["2 كجم لحم غنم", "ثوم مفروم", "حامض مصير", "كمون بلدي", "كأس زيت زيتون", "زعفران حر وسمن"],
                method: "1. نخلط اللحم مع جميع التوابل والسمن والزيت في 'القلوشة'. 2. نغلقها بورق الفرن ونربطها جيداً. 3. تُرسل لـ 'الفرناتشي' لتطهى في الرماد الساخن لمدة 4 ساعات على الأقل حتى يصبح اللحم مثل الزبدة.",
                strYoutube: "https://www.youtube.com/embed/Ew99EwM1R3I"
            },
            {
                strMeal: "الحريرة المغربية الحامضة",
                strMealThumb: "https://www.chhiwat-maghribia.com/wp-content/uploads/2016/06/harira.jpg",
                time: "60 دقيقة",
                ingredients: ["حمص وكرفس", "قزبر ومعدنوس", "طماطم محكوكة", "قطع لحم صغيرة", "عدس وشعرية", "دقيق للتدوير"],
                method: "1. نغلي اللحم والحمص والعدس مع الطماطم والكرفس. 2. بعد النضج، نضيف الشعرية. 3. نخلط الدقيق بالماء ونصبّه ببطء مع التحريك المستمر حتى يثقل القوام. 4. نضيف السمن والبيض في النهاية.",
                strYoutube: "https://www.youtube.com/embed/WJ6Yk_qU_kI"
            }
        ];

        window.onload = () => {
            localArchive.forEach(renderCard);
            fetchGlobal("Chicken"); // مقترحات عالمية أولية
        };

        async function fetchGlobal(q) {
            const res = await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${q}`);
            const data = await res.json();
            if(data.meals) data.meals.slice(0, 4).forEach(renderCard);
        }

        async function smartSearch() {
            const query = document.getElementById('searchInput').value;
            if(!query) return;
            const grid = document.getElementById('recipeGrid');
            grid.innerHTML = "";

            // البحث في الأرشيف المحلي أولاً (الشعبي)
            const localResults = localArchive.filter(r => r.strMeal.includes(query));
            localResults.forEach(renderCard);

            // ثم البحث العالمي
            const res = await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${query}`);
            const data = await res.json();
            if(data.meals) data.meals.forEach(renderCard);
            
            if(localResults.length === 0 && !data.meals) {
                alert("واالو! جرب كلمة أخرى بحال 'دجاج' أو 'Pizza'");
            }
        }

        function renderCard(meal) {
            const grid = document.getElementById('recipeGrid');
            const card = document.createElement('div');
            card.className = "recipe-card";
            card.innerHTML = `
                <img src="${meal.strMealThumb}" alt="${meal.strMeal}">
                <div class="card-info">
                    <h3>${meal.strMeal}</h3>
                    <p style="color:var(--gold); font-weight:bold; margin-bottom:15px;">⏱ ${meal.time || '45 دقيقة'}</p>
                    <button onclick='openLab(${JSON.stringify(meal).replace(/'/g, "&apos;")})' 
                        style="background:var(--gold); border:none; padding:12px 25px; border-radius:10px; cursor:pointer; font-weight:900; width:100%;">
                        دخول المختبر
                    </button>
                </div>
            `;
            grid.appendChild(card);
        }

        function openLab(meal) {
            document.getElementById('labOverlay').style.display = 'grid';
            document.getElementById('labTitle').innerText = meal.strMeal;
            document.getElementById('labTime').innerText = "مدة التحضير: " + (meal.time || "45 دقيقة");
            document.getElementById('methodText').innerText = meal.strInstructions || meal.method;
            document.getElementById('recipeSteps').style.display = 'none';
            document.getElementById('labStatus').innerText = "جمع المقادير";

            const list = document.getElementById('ingList');
            list.innerHTML = "";

            let ings = meal.ingredients || [];
            if(ings.length === 0) {
                for(let i=1; i<=20; i++) if(meal[`strIngredient${i}`]) ings.push(meal[`strMeasure${i}`] + " " + meal[`strIngredient${i}`]);
            }

            ings.forEach(ing => {
                const item = document.createElement('div');
                item.className = 'ing-item';
                item.innerText = ing;
                item.onclick = function() {
                    this.classList.toggle('checked');
                    checkCooking(ings.length, meal);
                };
                list.appendChild(item);
            });
        }

        function checkCooking(total, meal) {
            const checked = document.querySelectorAll('.ing-item.checked').length;
            if(checked === total) {
                document.getElementById('labStatus').innerText = "طابت الأكلة! 🔥";
                document.getElementById('recipeSteps').style.display = 'block';
                if(meal.strYoutube) {
                    const embed = meal.strYoutube.replace("watch?v=", "embed/");
                    document.getElementById('videoBox').innerHTML = `<iframe width="100%" height="450" src="${embed}" frameborder="0" allowfullscreen></iframe>`;
                }
            } else {
                document.getElementById('labStatus').innerText = `باقي ليك ${total - checked} مكونات`;
            }
        }

        function closeLab() {
            document.getElementById('labOverlay').style.display = 'none';
            document.getElementById('videoBox').innerHTML = "";
        }
    </script>
</body>
</html>
